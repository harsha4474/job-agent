<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Tailor — AI Powered</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #07090c;
      --surface: #0d1117;
      --surface2: #131920;
      --border: #1c2530;
      --border2: #243040;
      --accent: #f0c040;
      --accent2: #c49a20;
      --green: #3dd68c;
      --text: #e2e8f0;
      --text2: #7a8fa6;
      --text3: #3a4f66;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header {
      position: relative; z-index: 10; padding: 20px 40px;
      border-bottom: 1px solid var(--border); background: rgba(7,9,12,0.9);
      backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 34px; height: 34px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 16px; color: #07090c; font-weight: 800;
    }
    .logo-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
    .logo-name span { color: var(--accent); }
    .header-tag {
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent);
      background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2);
      padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px;
    }
    .main {
      max-width: 1200px; margin: 0 auto; padding: 40px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
    }
    @media (max-width: 900px) { .main { grid-template-columns: 1fr; padding: 24px 20px; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .panel-head {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .panel-icon {
      width: 28px; height: 28px; background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.2); border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .panel-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }
    .panel-body { padding: 24px; }
    .job-bar {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .job-bar-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
    .job-bar-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }
    .job-bar-company { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 2px; }
    label {
      display: block; font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
    }
    textarea, input {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s; resize: vertical;
    }
    textarea:focus, input:focus { border-color: var(--accent); }
    textarea::placeholder, input::placeholder { color: var(--text3); }
    #jd-input { min-height: 280px; line-height: 1.6; }
    .form-group { margin-bottom: 18px; }
    .tailor-btn {
      width: 100%; background: var(--accent); color: #07090c; border: none;
      border-radius: 10px; padding: 14px; font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .tailor-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .tailor-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; transform: none; }
    .loading-bar { display: none; margin-top: 16px; background: var(--surface2); border-radius: 6px; height: 3px; overflow: hidden; }
    .loading-bar.visible { display: block; }
    .loading-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 6px; animation: loadingAnim 1.5s ease-in-out infinite;
    }
    @keyframes loadingAnim {
      0% { width: 0%; margin-left: 0; }
      50% { width: 70%; margin-left: 15%; }
      100% { width: 0%; margin-left: 100%; }
    }
    .loading-text {
      display: none; text-align: center; margin-top: 12px;
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3);
    }
    .loading-text.visible { display: block; }
    .output-empty { padding: 60px 24px; text-align: center; color: var(--text3); }
    .output-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }
    .output-empty-title { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text3); margin-bottom: 6px; }
    .output-empty-sub { font-size: 12px; line-height: 1.6; max-width: 220px; margin: 0 auto; }
    #resume-output { display: none; padding: 24px; }
    #resume-output.visible { display: block; }
    .resume-section { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
    .resume-section:last-child { border-bottom: none; margin-bottom: 0; }
    .resume-section-label {
      font-family: 'DM Mono', monospace; font-size: 9px; color: var(--accent);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
    }
    .resume-section-content { font-size: 13px; line-height: 1.75; color: var(--text2); white-space: pre-wrap; }
    .export-bar { display: none; padding: 16px 24px; border-top: 1px solid var(--border); gap: 10px; background: var(--surface); }
    .export-bar.visible { display: flex; }
    .export-btn {
      flex: 1; padding: 11px; border-radius: 9px; border: 1px solid var(--border2);
      background: transparent; color: var(--text2); font-family: 'DM Mono', monospace;
      font-size: 11px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .export-btn:hover { border-color: var(--accent); color: var(--accent); }
    .export-btn.primary { background: var(--green); color: #07090c; border-color: var(--green); font-weight: 600; }
    .export-btn.primary:hover { background: #2db878; }
    .match-badge {
      display: none; margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--green); background: rgba(61,214,140,0.1);
      border: 1px solid rgba(61,214,140,0.2); padding: 3px 10px; border-radius: 20px;
    }
    .match-badge.visible { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">AI</div>
    <div class="logo-name">Resume<span>.</span>Tailor</div>
  </div>
  <div class="header-tag">GPT-4o POWERED</div>
</header>

<div class="main">

  <!-- Left Panel -->
  <div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-icon">📋</div>
        <div class="panel-title">Job Details</div>
        <div class="match-badge" id="match-badge">Tailored</div>
      </div>
      <div class="panel-body">

        <div class="job-bar" id="job-bar" style="display:none">
          <div class="job-bar-dot"></div>
          <div>
            <div class="job-bar-title" id="job-title-display">—</div>
            <div class="job-bar-company" id="job-company-display">—</div>
          </div>
        </div>

        <div class="form-group">
          <label>Job Title</label>
          <input type="text" id="job-title" placeholder="e.g. AI Product Manager"/>
        </div>

        <div class="form-group">
          <label>Company</label>
          <input type="text" id="job-company" placeholder="e.g. OpenAI"/>
        </div>

        <div class="form-group">
          <label>Job Description</label>
          <textarea id="jd-input" placeholder="Paste the full job description here..."></textarea>
        </div>

        <button class="tailor-btn" id="tailor-btn">Tailor My Resume</button>

        <div class="loading-bar" id="loading-bar"><div class="loading-bar-fill"></div></div>
        <div class="loading-text" id="loading-text">GPT-4o is tailoring your resume...</div>

      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div style="display:flex; flex-direction:column;">
    <div class="panel" style="flex:1; display:flex; flex-direction:column;">
      <div class="panel-head">
        <div class="panel-icon">📄</div>
        <div class="panel-title">Tailored Resume</div>
      </div>

      <div id="output-empty" class="output-empty">
        <div class="output-empty-icon">📄</div>
        <div class="output-empty-title">Your tailored resume will appear here</div>
        <div class="output-empty-sub">Paste a job description and click tailor</div>
      </div>

      <div id="resume-output"></div>

      <div class="export-bar" id="export-bar">
        <button class="export-btn" id="btn-txt">Download TXT</button>
        <button class="export-btn primary" id="btn-pdf">Download PDF</button>
      </div>
    </div>
  </div>

</div>

<script>
  var tailoredContent = '';

  // Auto-fill from URL params
  window.onload = function() {
    var params = new URLSearchParams(window.location.search);
    var job = params.get('job');
    var company = params.get('company');
    if (job || company) {
      document.getElementById('job-title').value = job || '';
      document.getElementById('job-company').value = company || '';
      document.getElementById('job-title-display').textContent = job || '';
      document.getElementById('job-company-display').textContent = company || '';
      document.getElementById('job-bar').style.display = 'flex';
    }

    // Button event listeners
    document.getElementById('tailor-btn').addEventListener('click', tailorResume);
    document.getElementById('btn-txt').addEventListener('click', exportTXT);
    document.getElementById('btn-pdf').addEventListener('click', exportPDF);
  };

  function tailorResume() {
    var jd = document.getElementById('jd-input').value.trim();
    var title = document.getElementById('job-title').value.trim();
    var company = document.getElementById('job-company').value.trim();

    if (!jd) {
      alert('Please paste a job description first.');
      return;
    }

    var btn = document.getElementById('tailor-btn');
    btn.disabled = true;
    btn.textContent = 'Tailoring...';
    document.getElementById('loading-bar').classList.add('visible');
    document.getElementById('loading-text').classList.add('visible');
    document.getElementById('output-empty').style.display = 'none';
    document.getElementById('resume-output').classList.remove('visible');
    document.getElementById('export-bar').classList.remove('visible');

    fetch('/tailor-resume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobDescription: jd, jobTitle: title, company: company })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      tailoredContent = data.tailoredResume;
      renderResume(tailoredContent);
    })
    .catch(function(err) {
      document.getElementById('output-empty').style.display = 'block';
      document.getElementById('output-empty').querySelector('.output-empty-title').textContent = 'Error: ' + err.message;
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Tailor My Resume';
      document.getElementById('loading-bar').classList.remove('visible');
      document.getElementById('loading-text').classList.remove('visible');
    });
  }

  function renderResume(content) {
    var outputEl = document.getElementById('resume-output');
    var sectionMap = {
      'SUMMARY': 'Summary',
      'KEY EXPERIENCE': 'Key Experience Highlights',
      'RELEVANT SKILLS': 'Relevant Skills',
      'WHY I': "Why I'm a Strong Fit"
    };

    var html = '';
    var parts = content.split(/\n(?=[A-Z][A-Z\s&]+:)/);

    parts.forEach(function(part) {
      var colonIdx = part.indexOf(':');
      if (colonIdx === -1) return;
      var rawHeader = part.substring(0, colonIdx).trim();
      var body = part.substring(colonIdx + 1).trim();
      var matchKey = Object.keys(sectionMap).find(function(k) {
        return rawHeader.toUpperCase().indexOf(k) !== -1;
      });
      var label = matchKey ? sectionMap[matchKey] : rawHeader;
      html += '<div class="resume-section"><div class="resume-section-label">' + label + '</div><div class="resume-section-content">' + body + '</div></div>';
    });

    if (!html) {
      html = '<div class="resume-section"><div class="resume-section-content">' + content + '</div></div>';
    }

    outputEl.innerHTML = html;
    outputEl.classList.add('visible');
    document.getElementById('export-bar').classList.add('visible');
    document.getElementById('match-badge').classList.add('visible');
  }

  function exportTXT() {
    if (!tailoredContent) return;
    var title = document.getElementById('job-title').value || 'Resume';
    var company = document.getElementById('job-company').value || '';
    var blob = new Blob([tailoredContent], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = ('Tailored_Resume_' + title + '_' + company).replace(/\s+/g, '_') + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  function exportPDF() {
    if (!tailoredContent) return;
    var doc = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    var margin = 20;
    var contentWidth = 170;
    var y = margin;

    doc.setFillColor(7, 9, 12);
    doc.rect(0, 0, 210, 297, 'F');

    doc.setFillColor(13, 17, 23);
    doc.rect(0, 0, 210, 24, 'F');
    doc.setFillColor(240, 192, 64);
    doc.rect(0, 24, 210, 0.8, 'F');

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(226, 232, 240);
    doc.text('Resume.Tailor', margin, 15);

    var jobTitle = document.getElementById('job-title').value || 'Tailored Resume';
    var jobCompany = document.getElementById('job-company').value || '';
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(122, 143, 166);
    doc.text(jobCompany ? jobTitle + ' @ ' + jobCompany : jobTitle, 190, 15, { align: 'right' });

    y = 36;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.setTextColor(226, 232, 240);
    doc.text('A.V.S Sri Harsha', margin, y);
    y += 7;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(122, 143, 166);
    doc.text('sriharsha.adda@gmail.com  |  +1(334)434-6660  |  Atlanta, GA', margin, y);
    y += 10;

    doc.setDrawColor(28, 37, 48);
    doc.setLineWidth(0.5);
    doc.line(margin, y, 190, y);
    y += 10;

    var parts = tailoredContent.split(/\n(?=[A-Z][A-Z\s&]+:)/);
    parts.forEach(function(part) {
      var colonIdx = part.indexOf(':');
      if (colonIdx === -1) return;
      var header = part.substring(0, colonIdx).trim();
      var body = part.substring(colonIdx + 1).trim();

      if (y > 260) {
        doc.addPage();
        doc.setFillColor(7, 9, 12);
        doc.rect(0, 0, 210, 297, 'F');
        y = margin;
      }

      doc.setFillColor(13, 17, 23);
      doc.roundedRect(margin, y - 4, contentWidth, 10, 2, 2, 'F');
      doc.setFillColor(240, 192, 64);
      doc.rect(margin, y - 4, 2, 10, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(240, 192, 64);
      doc.text(header.toUpperCase(), margin + 6, y + 2);
      y += 12;

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(122, 143, 166);
      var lines = doc.splitTextToSize(body, contentWidth - 8);
      lines.forEach(function(line) {
        if (y > 278) {
          doc.addPage();
          doc.setFillColor(7, 9, 12);
          doc.rect(0, 0, 210, 297, 'F');
          y = margin;
        }
        doc.text(line, margin + 4, y);
        y += 5.5;
      });
      y += 6;
    });

    doc.setFillColor(13, 17, 23);
    doc.rect(0, 285, 210, 12, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(122, 143, 166);
    doc.text('Generated by Resume.Tailor', margin, 292);

    var filename = ('Harsha_Resume_' + jobTitle + '_' + jobCompany).replace(/\s+/g, '_').substring(0, 50);
    doc.save(filename + '.pdf');
  }
</script>

</body>
</html>
